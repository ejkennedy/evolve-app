name: evolve
description: "Evolve – Adaptive Goals & Habits Coach powered by AI"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.1

  # Navigation
  go_router: ^14.6.3

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Networking
  dio: ^5.7.0

  # Auth & Backend
  supabase_flutter: ^2.8.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Serialization (models only – no code gen needed at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / Theming
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  collection: ^1.19.1
  timeago: ^3.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.3

  # Env / Config (runtime .env file – no build step required)
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env
